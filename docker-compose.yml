version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: aura_postgres
    restart: always
    environment:
      POSTGRES_USER: aura_user
      POSTGRES_PASSWORD: aura_db_ai_pass
      POSTGRES_DB: aura_ai
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7
    container_name: aura_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  chromadb:
    image: chromadb/chroma
    container_name: aura_chromadb
    restart: always
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma

volumes:
  postgres_data:
  redis_data:
  chroma_data: